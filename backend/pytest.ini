[pytest]
# Discover tests only inside the tests/ directory.
testpaths = tests

# pytest-asyncio: treat every async test function as asyncio automatically.
asyncio_mode = auto

# Show short tracebacks and 20 slowest tests on each run.
addopts = -v --tb=short

# Ignore any __pycache__ / .pyc artefacts.
norecursedirs = __pycache__ .git .tox dist build
