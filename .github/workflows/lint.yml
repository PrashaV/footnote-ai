# ─── lint.yml ────────────────────────────────────────────────────────────────
# Linting pass on every push.
#   • Backend : ruff (Python) on backend/
#   • Frontend: eslint + prettier --check on frontend/
#
# No secrets required for this workflow.
# ─────────────────────────────────────────────────────────────────────────────

name: Lint

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  # ── Python backend linting ─────────────────────────────────────────────────
  lint-backend:
    name: ruff (backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on backend/
        run: ruff check backend/

  # ── React/TypeScript frontend linting ─────────────────────────────────────
  lint-frontend:
    name: eslint + prettier (frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Prettier check
        working-directory: frontend
        # prettier --check exits non-zero if any files need formatting
        run: npx prettier --check "src/**/*.{ts,tsx,css}"
